<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Alexander Osorio Munera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0D0D0D;
      color: #F0F0F0;
      font-family: 'Inter', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .error { max-width: 480px; }
    .error__code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, #FF6B35, #7B2FFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .error__text {
      font-size: 1.2rem;
      color: #A0A0B0;
      margin: 16px 0 32px;
    }
    .error__link {
      display: inline-block;
      padding: 14px 32px;
      background: #FF6B35;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      transition: background 0.2s, transform 0.2s;
    }
    .error__link:hover {
      background: #e85a28;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error">
    <div class="error__code">404</div>
    <p class="error__text">This page doesn't exist. But there's plenty to see on the homepage.</p>
    <a href="/" class="error__link">Go Home</a>
  </div>
</body>
</html>
